name: Daily Python Job

on:
  schedule:
    - cron: "0 7 * * *"   # runs daily at 07:00 UTC
  workflow_dispatch: {}    # allows manual run from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: |
          python main.py
          
      - name: Debug list data folder
        run: |
          echo "PWD=$(pwd)"
          ls -lah
          echo "---- data ----"
          ls -lah data || true


      - name: Upload deduped output only
        uses: actions/upload-artifact@v4
        with:
          name: deduped
          path: data/latest_dedup.csv

