name: Daily Python Job

on:
  schedule:
    - cron: "0 8 * * *"    # 09:00 Amsterdam (winter) -> 18h lookback
    - cron: "0 14 * * *"   # 15:00 Amsterdam (winter) -> 6h lookback
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Set lookback hours for this run
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "08" ]; then echo "LOOKBACK_HOURS=18" >> $GITHUB_ENV; fi
          if [ "$HOUR" = "14" ]; then echo "LOOKBACK_HOURS=6"  >> $GITHUB_ENV; fi
          echo "LOOKBACK_HOURS set to: $LOOKBACK_HOURS"

      - name: Run script
        run: |
          python main.py
        env:
          LOOKBACK_HOURS: ${{ env.LOOKBACK_HOURS }}

      - name: Keep only dedup XLSX
        run: |
          rm -f data/google_news_raw_*.xlsx
          rm -f data/search_audit_*.xlsx
          rm -f data/google_news_dedup_audit_*.xlsx
          ls -lah data

      - name: Commit XLSX to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/latest_deduped.xlsx
          git commit -m "Update latest deduped XLSX" || echo "No changes"
          git push
